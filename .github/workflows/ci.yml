name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install linting tools
        run: sudo apt-get install -y clang-format clang-tidy cppcheck
      - name: Check formatting
        run: make lint-format
      - name: Run clang-tidy
        run: make lint-tidy
      - name: Run cppcheck
        run: make lint-cppcheck

  rust:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --check
      - name: Run Clippy
        run: cargo clippy -- -D warnings
      - name: Run tests
        run: cargo test

  python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"
      - name: Install ruff
        run: pip install ruff
      - name: Check formatting
        run: make lint-python-format
      - name: Run ruff
        run: make lint-python-check

  generate:
    # Re-run `tree-sitter generate` and the pyproject.extra.toml merge, then
    # fail if any committed file would change. Keeps the autogenerated bindings
    # (see .gitattributes) in sync with grammar.js / tree-sitter.json, while
    # preserving hand-maintained sections like [tool.cibuildwheel].
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@eeb902ac2f1be576edc296309872cf476a209b7f # v2
      - name: Regenerate bindings
        run: make generate-bindings
      - name: Check for drift
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated files are out of date. Run 'make generate-bindings' locally and commit the result."
            exit 1
          fi

  check-wasm:
    # Rebuild tree-sitter-rst.wasm and fail if it differs from the committed
    # file. Keeps the playground artefact in sync with grammar.js changes.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@eeb902ac2f1be576edc296309872cf476a209b7f # v2
      - name: Rebuild wasm
        run: make wasm
      - name: Check for drift
        run: |
          if ! git diff --exit-code tree-sitter-rst.wasm; then
            echo "::error::tree-sitter-rst.wasm is out of date. Run 'make wasm' locally and commit the result."
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@eeb902ac2f1be576edc296309872cf476a209b7f # v2
      - name: Run tests
        uses: tree-sitter/parser-test-action@v2
        with:
          test-rust: true
          test-node: false
          test-python: true
          test-go: false
          test-swift: false
      - run: make parse-examples
  python-build:
    name: Python build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"
      - name: Install build frontend
        run: pip install build
      - name: Build wheel
        run: python -m build
      - name: Install wheel
        run: pip install "$(ls dist/*.whl)" "tree-sitter~=0.25"
        shell: bash
      - name: Smoke-test import
        run: python -c "import tree_sitter_rst; print(tree_sitter_rst.language())"

  windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@eeb902ac2f1be576edc296309872cf476a209b7f # v2
      - name: Run tests
        uses: tree-sitter/parser-test-action@v2
        with:
          test-rust: true
          test-node: false
          test-python: true
          test-go: false
          test-swift: false
  mac:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@eeb902ac2f1be576edc296309872cf476a209b7f # v2
      - name: Run tests
        uses: tree-sitter/parser-test-action@v2
        with:
          test-rust: true
          test-node: false
          test-python: true
          test-go: false
          test-swift: false
